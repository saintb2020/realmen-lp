<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決済完了 - REAL MEN</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0B0A0A;
  --coal:#151313;
  --line:#38302F;
  --white:#F2EDE8;
  --gray:#9A908B;
  --gold:#C9A24B;
  --green:#0E3B2E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--black);
  color:var(--white);
  font-family:'Noto Sans JP',sans-serif;
  line-height:1.8;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
}
.card{max-width:480px;width:100%;text-align:center}
.brand{font-size:12px;letter-spacing:.5em;color:var(--gray);font-weight:700;margin-bottom:32px}
h1{font-weight:900;font-size:clamp(26px,7vw,34px);line-height:1.3;margin-bottom:10px}
.lead{font-size:15px;font-weight:700;margin-bottom:36px}
.step{
  font-size:12px;letter-spacing:.3em;color:var(--gold);font-weight:900;
  border:1px solid var(--gold);display:inline-block;padding:5px 14px 4px;border-radius:2px;
  margin-bottom:14px;
}
.instruction{font-size:15px;margin-bottom:18px}
.code-box{
  background:var(--coal);border:1px solid var(--line);border-radius:8px;
  padding:22px 18px;margin-bottom:14px;
}
.code{
  font-size:clamp(24px,7vw,30px);font-weight:900;letter-spacing:.08em;
  user-select:all;-webkit-user-select:all;
}
.copy-btn{
  width:100%;
  background:var(--coal);color:var(--white);
  border:1px solid var(--line);border-radius:6px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:14px;letter-spacing:.1em;
  padding:14px;margin-bottom:12px;
  transition:border-color .15s;
}
.copy-btn:active{border-color:var(--gold)}
.line-btn{
  display:block;width:100%;
  background:var(--gold);color:var(--black);
  border:none;border-radius:6px;cursor:pointer;text-decoration:none;
  font-weight:900;font-size:17px;letter-spacing:.12em;
  padding:19px;
  box-shadow:0 10px 30px rgba(201,162,75,.28);
  transition:transform .15s;
}
.line-btn:active{transform:scale(.98)}
.note{margin-top:22px;font-size:12px;color:var(--gray);line-height:1.9}
.close-line{
  margin-top:44px;font-weight:900;letter-spacing:.14em;
  font-size:clamp(16px,4.6vw,20px);
}
.close-line .gold{color:var(--gold)}
</style>
</head>
<body>
<div class="card">
  <p class="brand">REAL MEN</p>
  <h1>決済完了。<br>よく決めた。</h1>
  <p class="lead">ここからの手順は、一つだけだ。</p>

  <span class="step">合言葉</span>
  <div class="code-box">
    <div class="code" id="code">ボトムライン31</div>
  </div>
  <button class="copy-btn" onclick="copyCode(this)">合言葉をコピーする</button>

  <p class="instruction">コピーしたら、下のボタンで公式LINEを開いて、<br>そのまま送信しろ。コースが即座に届く。</p>

  <!-- ▼▼ LINE友だち追加/トーク画面のURLに差し替え ▼▼ -->
  <a class="line-btn" href="https://lin.ee/OwEOHEN">LINEを開いて送信する</a>

  <p class="note">
    コースが届かない場合は、合言葉「ボトムライン31」を<br>
    もう一度そのまま送信してください。<br>
    解決しない場合:info@realmen.jp
  </p>

  <p class="close-line">BE A <span class="gold">REAL MAN</span></p>
</div>

<script>
function copyCode(btn){
  const text = document.getElementById('code').textContent;
  function done(){
    btn.textContent = 'コピーした。LINEで送信しろ';
    setTimeout(()=>{ btn.textContent = '合言葉をコピーする'; }, 2500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback());
  } else { fallback(); }
  function fallback(){
    const r = document.createRange();
    r.selectNodeContents(document.getElementById('code'));
    const s = window.getSelection();
    s.removeAllRanges(); s.addRange(r);
    try { document.execCommand('copy'); done(); } catch(e){}
    s.removeAllRanges();
  }
}
</script>
</body>
</html>
